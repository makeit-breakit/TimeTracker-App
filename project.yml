name: TimeTracker
options:
  bundleIdPrefix: com.timetracker
  deploymentTarget:
    macOS: "13.0"

settings:
  base:
    SWIFT_VERSION: "5.9"
    MACOSX_DEPLOYMENT_TARGET: "13.0"

targets:
  TimeTracker:
    type: application
    platform: macOS
    deploymentTarget: "13.0"
    sources:
      - path: TimeTracker
        excludes:
          - "**/*.entitlements"
          - "App/Info.plist"
    info:
      path: TimeTracker/App/Info.plist
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.timetracker.app
        CODE_SIGN_IDENTITY: "-"
        CODE_SIGN_ENTITLEMENTS: TimeTracker/TimeTracker.entitlements
        CODE_SIGN_STYLE: Manual
        DEVELOPMENT_TEAM: ""
        ENABLE_HARDENED_RUNTIME: "YES"
